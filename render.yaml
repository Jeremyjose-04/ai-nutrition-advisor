services:
  - type: web
    name: ai-nutrition-backend
    env: python
    rootDir: backend
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn api.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0

  - type: web
    name: ai-nutrition-frontend
    env: static
    buildCommand: "npm install && npx vite build"
    staticPublishPath: "./dist"
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: ai-nutrition-backend
          property: hostport
